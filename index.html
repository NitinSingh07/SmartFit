<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Fitness Watch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="logo">FitWatch</div>
    <nav class="nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">Pricing</a></li>
      </ul>
    </nav>
    <div class="menu-toggle">☰</div>
  </header>

  <section class="hero">
    <h1>Track Your Fitness Smartly</h1>
    <p>Your health companion on your wrist</p>
    <button>Buy Now</button>
  </section>

  <section class="features">
    <div class="feature">Heart Rate Monitor</div>
    <div class="feature">Sleep Tracking</div>
    <div class="feature">Step Counter</div>
  </section>

  <section class="pricing">
    <div class="plan">Basic Plan</div>
    <div class="plan">Premium Plan</div>
  </section>

  <section class="testimonials">
    <p id="testimonial-text">Great product!</p>
    <button id="prev">Prev</button>
    <button id="next">Next</button>
  </section>

  <section class="signup">
    <input type="email" id="email" placeholder="Enter email">
    <button id="submit">Subscribe</button>
    <p id="error"></p>
  </section>

  <footer>
    <p>© 2026 FitWatch</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
