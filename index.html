<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Fitness Watch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="logo">FitWatch</div>
    <nav class="nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">Pricing</a></li>
      </ul>
    </nav>
    <div class="menu-toggle">☰</div>
  </header>

  <section class="hero">
    <div class="container hero-container">
      <div class="hero-content">
        <h1>Track Your Fitness <span class="accent">Smartly</span></h1>
        <p>Your ultimate health companion on your wrist. Monitor heart rate, sleep, and steps with precision.</p>
        <div class="hero-btns">
          <button class="btn btn-primary">Buy Now</button>
          <button class="btn btn-outline">Learn More</button>
        </div>
      </div>
      <div class="hero-image">
        <!-- Image placeholder or CSS-based watch graphic will be styled here -->
        <div class="watch-placeholder"></div>
      </div>
    </div>
  </section>

  <section class="features">
    <div class="feature">Heart Rate Monitor</div>
    <div class="feature">Sleep Tracking</div>
    <div class="feature">Step Counter</div>
  </section>

  <section class="pricing">
    <div class="plan">Basic Plan</div>
    <div class="plan">Premium Plan</div>
  </section>

  <section class="testimonials">
    <p id="testimonial-text">Great product!</p>
    <button id="prev">Prev</button>
    <button id="next">Next</button>
  </section>

  <section class="signup">
    <input type="email" id="email" placeholder="Enter email">
    <button id="submit">Subscribe</button>
    <p id="error"></p>
  </section>

  <footer>
    <p>© 2026 FitWatch</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
